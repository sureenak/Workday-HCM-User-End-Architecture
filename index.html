<style>
:root{--green:#0d7a5f;--green-d:#0a5f4a;--ink:#1d2b26;--mute:#5d6b64;--paper:#f7f5f0;--line:#e4e8e3;--soft:#eef2ee;--amber-bg:#fdf4e3;--amber-line:#f0dcae;--amber-ink:#8a5a12;--font-d:'Fraunces',Georgia,serif;--font-b:'Noto Sans','Noto Sans Thai','Noto Sans Khmer','Noto Sans SC',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{font-family:var(--font-b);background:var(--paper);color:var(--ink);line-height:1.5}
.app{display:grid;grid-template-columns:250px 300px 1fr;height:100vh}
.col{height:100vh;overflow-y:auto}
.c1{background:#fbfaf6;border-right:1px solid var(--line);padding:22px 18px;display:flex;flex-direction:column;gap:14px}
.c2{background:#fcfbf8;border-right:1px solid var(--line);padding:24px 20px}.c3{padding:30px 38px 70px;max-width:760px}
.brand-top{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--green);font-weight:700}
.brand-title{font-family:var(--font-d);font-size:23px;line-height:1.05;font-weight:600;margin-top:5px;letter-spacing:-.01em}
.brand-tag{font-size:11.5px;color:var(--mute);margin-top:6px}
.pilot-badge{display:inline-block;margin-top:8px;font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--green-d);background:var(--soft);border:1px solid var(--line);border-radius:999px;padding:3px 10px}
.langs{display:flex;flex-wrap:wrap;gap:5px}
.lang{font-size:12px;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--mute);border-radius:999px;padding:5px 11px;cursor:pointer;transition:.15s}
.lang:hover{border-color:var(--green);color:var(--green)}.lang.on{background:var(--green);border-color:var(--green);color:#fff}
.search{position:relative}.search input{width:100%;font-family:var(--font-b);font-size:13px;padding:10px 12px 10px 32px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);outline:none}
.search input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(13,122,95,.1)}
.search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--mute)}
.nav-h{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:#9aa69f;font-weight:700;margin:8px 0 2px}
.role-btn{display:flex;align-items:center;gap:9px;width:100%;text-align:left;border:none;background:none;cursor:pointer;padding:8px 9px;border-radius:9px;transition:.12s;font-family:var(--font-b)}
.role-btn:hover{background:#f1f4f0}.role-btn.on{background:#fff;box-shadow:inset 0 0 0 1px var(--line)}.role-btn.on .rn{color:var(--accent)}
.dot{width:8px;height:8px;border-radius:50%;flex:none}.role-btn .rn{font-size:13px;font-weight:600}.role-btn .rs{font-size:10px;color:var(--mute);margin-top:1px}
.foot{margin-top:auto;font-size:10px;color:#9aa69f;line-height:1.5;border-top:1px solid var(--line);padding-top:11px}
.c2-role{font-family:var(--font-d);font-size:21px;font-weight:600;line-height:1.1;color:var(--accent)}
.c2-sub{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);font-weight:700;margin-top:4px}
.c2-meta{margin:14px 0 4px;display:grid;gap:7px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:13px 0}
.c2-meta .row{font-size:12px;line-height:1.45}.c2-meta .ml{font-weight:700;color:var(--accent);font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;display:block;margin-bottom:1px}
.c2-meta .row.comp .ml{color:var(--amber-ink)}
.topics-h{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:#9aa69f;font-weight:700;margin:16px 0 8px}
.topic{width:100%;text-align:left;border:none;background:none;cursor:pointer;padding:10px 11px;border-radius:10px;transition:.12s;display:block;margin-bottom:3px;border:1px solid transparent}
.topic:hover{background:#fff}.topic.on{background:#fff;border-color:var(--accent);box-shadow:0 3px 12px -8px rgba(0,0,0,.25)}
.topic .tt{font-size:13px;font-weight:700;color:var(--ink)}.topic.on .tt{color:var(--accent)}
.topic .td{font-size:11px;color:var(--mute);margin-top:2px;line-height:1.4}
.topic .tc{float:right;font-size:10px;font-weight:700;color:#fff;background:var(--accent);border-radius:999px;padding:1px 7px;margin-top:1px}
.c3-head{border-bottom:2px solid var(--accent);padding-bottom:13px;margin-bottom:6px}
.c3-eyebrow{font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--accent);font-weight:700}
.c3-title{font-family:var(--font-d);font-size:27px;font-weight:600;line-height:1.08;margin-top:5px}.c3-def{font-size:13.5px;color:var(--mute);margin-top:6px}
.task{margin-top:22px;padding-left:15px;border-left:3px solid var(--soft)}.task:hover{border-left-color:var(--accent)}
.t-name{font-size:15.5px;font-weight:700}.t-what{font-size:13.5px;color:#33433d;margin:3px 0 8px}.t-meta{display:grid;gap:3px}
.t-line{font-size:12px;color:var(--mute);display:flex;gap:9px}.t-line .tl{font-weight:700;color:var(--accent);text-transform:uppercase;font-size:10px;letter-spacing:.05em;min-width:48px;flex:none;padding-top:1px}.t-line .tv{color:#3a4a44}
.draft{display:none;align-items:center;gap:9px;background:#fff7e6;border:1px solid var(--amber-line);color:var(--amber-ink);border-radius:11px;padding:10px 13px;font-size:12px;margin-bottom:18px;line-height:1.45}.draft.show{display:flex}
.empty{color:var(--mute);font-size:14px;padding:24px 0}.search-role{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);margin:22px 0 6px}
@media(max-width:920px){.app{grid-template-columns:1fr;height:auto}.col{height:auto}.c1,.c2{border-right:none;border-bottom:1px solid var(--line)}.c3{padding:24px 20px 50px}}
</style></head><body>

 let h=`<div class="c2-role" style="--accent:${r.color}">${r.name}</div><div class="c2-sub">${tx(r.sub)}</div><div class="c2-meta" style="--accent:${r.color}"><div class="row"><span class="ml">${u.who}</span>${tx(r.who)}</div><div class="row"><span class="ml">${u.scope}</span>${tx(r.scope)}</div><div class="row comp"><span class="ml">${u.comp}</span>${tx(r.comp)}</div></div><div class="topics-h">${u.topics}</div>`;
 ars.forEach(a=>{const cnt=r.tasks.filter(t=>t.a===a).length;h+=`<button class="topic${a===area?' on':''}" data-a="${a}" style="--accent:${r.color}"><span class="tc">${cnt}</span><span class="tt">${aLabel(a)}</span><span class="td">${aDef(a)}</span></button>`;});
 $("#mid").innerHTML=h;document.querySelectorAll(".topic").forEach(b=>b.onclick=()=>{area=b.dataset.a;query="";$("#search").value="";renderMid();renderRight();});}
function taskHTML(t,a){const u=UI[lang];return `<div class="task" style="--accent:${a}"><div class="t-name">${t.n}</div><div class="t-what">${t.w}</div><div class="t-meta">${t.t?`<div class="t-line"><span class="tl">${u.when}</span><span class="tv">${t.t}</span></div>`:""}${t.f?`<div class="t-line"><span class="tl">${u.find}</span><span class="tv">${t.f}</span></div>`:""}</div></div>`;}
function renderRight(){const u=UI[lang];
 if(query){const q=query.toLowerCase();let h=`<div class="c3-head" style="--accent:var(--green)"><div class="c3-eyebrow">${u.search.replace('\u2026','')}</div><div class="c3-title">\u201c${query}\u201d</div></div>`;let any=false;
  ROLES.forEach(r=>{const hits=r.tasks.filter(t=>t.n.toLowerCase().includes(q)||t.w.toLowerCase().includes(q));if(hits.length){any=true;h+=`<div class="search-role" style="--accent:${r.color}">${r.name}</div>`+hits.map(t=>taskHTML(t,r.color)).join("");}});
  if(!any)h+=`<div class="empty">${u.none}</div>`;$("#content").innerHTML=h;return;}
 const r=ROLES.find(x=>x.id===current);if(!area){$("#content").innerHTML="";return;}
 const ts=r.tasks.filter(t=>t.a===area);
 let h=`<div class="c3-head" style="--accent:${r.color}"><div class="c3-eyebrow">${r.name}</div><div class="c3-title">${aLabel(area)}</div><div class="c3-def">${aDef(area)}</div></div>`+ts.map(t=>taskHTML(t,r.color)).join("");
 $("#content").innerHTML=h;}
function renderAll(){buildNav();renderMid();renderRight();}
$("#search").addEventListener("input",e=>{query=e.target.value.trim();if(query)document.querySelectorAll('.topic').forEach(t=>t.classList.remove('on'));renderRight();});
buildLangs();applyUI();{const r=ROLES.find(x=>x.id===current);area=areasOf(r)[0]||null;}renderAll();
</script></body></html>
